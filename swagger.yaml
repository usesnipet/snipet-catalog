                    minLength: 1
                    maxLength: 255
                  description:
                    type: string
                    minLength: 1
                  icon:
                    type: string
                    minLength: 1
                    maxLength: 255
                  background:
                    type: string
                    minLength: 1
                    maxLength: 255
                  tags:
