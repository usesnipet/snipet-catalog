                  items:
                    type: string
                    minLength: 1
                    maxLength: 255
                version:
                  type: object
                  properties:
                    version:
                      type: string
                      minLength: 1
                      maxLength: 255
                    pluginManifest: {}
                  required:
                    - version
                    - pluginManifest
              required:
                - packageName
                - name
                - description
                - icon
                - background
                - version
      responses:
        "201":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                    pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
